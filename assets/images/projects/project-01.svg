<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff" />
    </marker>
  </defs>
  <rect width="800" height="450" fill="#050a14" />
  <g opacity="0.03">
    <circle cx="40" cy="40" r="1" fill="#ffffff" />
    <circle cx="80" cy="40" r="1" fill="#ffffff" />
    <circle cx="120" cy="40" r="1" fill="#ffffff" />
    <!-- ... simplified grid ... -->
    <rect width="800" height="450" fill="url(#grid)" />
  </g>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.03" />
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grid)" />
  
  <text x="20" y="30" fill="#00d4ff" font-family="monospace" font-size="10" opacity="0.6">// AI · AGENTIC RAG</text>
  
  <!-- Nodes -->
  <rect x="50" y="200" width="120" height="50" rx="8" fill="rgba(255,255,255,0.04)" stroke="#00d4ff" stroke-width="1" />
  <text x="110" y="230" fill="#ffffff" font-family="monospace" font-size="12" text-anchor="middle">User Query</text>
  
  <rect x="220" y="200" width="140" height="50" rx="8" fill="rgba(255,255,255,0.04)" stroke="#a855f7" stroke-width="1.5" />
  <text x="290" y="230" fill="#ffffff" font-family="monospace" font-size="12" text-anchor="middle">Multi-Agent</text>
  
  <rect x="410" y="150" width="140" height="50" rx="8" fill="rgba(255,255,255,0.04)" stroke="#00d4ff" stroke-width="1" />
  <text x="480" y="180" fill="#ffffff" font-family="monospace" font-size="12" text-anchor="middle">Hybrid Search</text>
  
  <rect x="410" y="250" width="140" height="50" rx="8" fill="rgba(255,255,255,0.04)" stroke="#00d4ff" stroke-width="1" />
  <text x="480" y="280" fill="#ffffff" font-family="monospace" font-size="12" text-anchor="middle">PubMed Docs</text>
  
  <rect x="600" y="200" width="120" height="50" rx="8" fill="rgba(255,255,255,0.04)" stroke="#00d4ff" stroke-width="1" />
  <text x="660" y="230" fill="#ffffff" font-family="monospace" font-size="12" text-anchor="middle">Response</text>
  
  <!-- Arrows -->
  <line x1="170" y1="225" x2="210" y2="225" stroke="#00d4ff" stroke-width="1.5" opacity="0.7" marker-end="url(#arrowhead)" />
  <line x1="360" y1="215" x2="400" y2="185" stroke="#00d4ff" stroke-width="1.5" opacity="0.7" marker-end="url(#arrowhead)" />
  <line x1="360" y1="235" x2="400" y2="265" stroke="#00d4ff" stroke-width="1.5" opacity="0.7" marker-end="url(#arrowhead)" />
  <line x1="550" y1="185" x2="590" y2="215" stroke="#00d4ff" stroke-width="1.5" opacity="0.7" marker-end="url(#arrowhead)" />
  <line x1="550" y1="265" x2="590" y2="235" stroke="#00d4ff" stroke-width="1.5" opacity="0.7" marker-end="url(#arrowhead)" />
</svg>
